name: Telegram Offer Update

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Slug dell'offerta da pubblicare"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - bbva
          - buddybank
          - revolut
          - trade-republic
  schedule:
    - cron: "30 8 * * 1-5"

jobs:
  telegram-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip openai pillow

      - name: Pick offer slug
        id: slug
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            echo "value=${{ github.event.inputs.slug }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Render Telegram message
        run: |
          ROTATION_ARGS=""
          if [ "${{ steps.slug.outputs.value }}" = "auto" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ROTATION_ARGS="--rotation-index ${{ github.run_number }}"
          fi
          python3 scripts/render_telegram_post.py \
            --slug "${{ steps.slug.outputs.value }}" \
            --base-url "${{ secrets.SITE_BASE_URL }}" \
            ${ROTATION_ARGS} > telegram-message.json
          echo "Messaggio generato:"
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("telegram-message.json").read_text(encoding="utf-8"))
          print(f"Offerta selezionata: {payload.get('offer_name')} ({payload.get('slug')})")
          print("")
          print(payload.get("text", ""))
          print("")
          print("Pulsanti:")
          for row in payload.get("reply_markup", {}).get("inline_keyboard", []):
              print(" | ".join(button.get("text", "") for button in row))
          PY

      - name: Extract selected offer slug
        id: selected
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("telegram-message.json").read_text(encoding="utf-8"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"slug={payload['slug']}\n")
          PY

      - name: Generate promo image
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          python3 scripts/generate_telegram_card.py \
            --slug "${{ steps.selected.outputs.slug }}" \
            --base-url "${SITE_BASE_URL}" \
            --out tmp/telegram/promo-card.png

      - name: Attach promo image to Telegram payload
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload_path = Path("telegram-message.json")
          payload = json.loads(payload_path.read_text(encoding="utf-8"))
          payload["photo_path"] = "tmp/telegram/promo-card.png"
          payload_path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Check Telegram configuration
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "TELEGRAM_CHAT_ID mancante"
            exit 1
          fi
          echo "TELEGRAM_CHAT_ID configurato."

      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/send_telegram.py < telegram-message.json
