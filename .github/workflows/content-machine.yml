name: Content Machine

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Tipo di output"
        required: true
        default: "offer"
        type: choice
        options:
          - offer
          - weekly
      slug:
        description: "Offerta da usare, oppure auto"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - bbva
          - buddybank
          - revolut
          - trade-republic
      use_openai:
        description: "Usa OpenAI per testi piu naturali"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "10 7 * * 1-5"

permissions:
  contents: write

jobs:
  generate-content-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Pick mode
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "value=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=offer" >> "$GITHUB_OUTPUT"
          fi

      - name: Pick slug
        id: slug
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            echo "value=${{ github.event.inputs.slug }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Build template content pack
        if: ${{ github.event.inputs.use_openai != 'true' }}
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          python3 scripts/build_content_pack.py \
            --mode "${{ steps.mode.outputs.value }}" \
            --slug "${{ steps.slug.outputs.value }}" \
            --base-url "${SITE_BASE_URL}"

      - name: Build AI content pack
        if: ${{ github.event.inputs.use_openai == 'true' }}
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 scripts/build_content_pack.py \
            --mode "${{ steps.mode.outputs.value }}" \
            --slug "${{ steps.slug.outputs.value }}" \
            --base-url "${SITE_BASE_URL}" \
            --use-openai

      - name: Commit generated content
        run: |
          git add content/machine
          if git diff --cached --quiet; then
            echo "Nessuna modifica da salvare."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add automated content pack"
          git push
