name: Daily Content Factory

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Offerta da usare, oppure auto"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - bbva
          - buddybank
          - revolut
          - trade-republic
      use_openai:
        description: "Usa OpenAI per pack e script piu naturali"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "0 7 * * 1-5"

permissions:
  contents: write

jobs:
  build-daily-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip openai pillow

      - name: Pick slug
        id: slug
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            echo "value=${{ github.event.inputs.slug }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Build template daily package
        if: ${{ github.event.inputs.use_openai != 'true' }}
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          ROTATION_ARGS=""
          if [ "${{ steps.slug.outputs.value }}" = "auto" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ROTATION_ARGS="--rotation-index ${{ github.run_number }}"
          fi
          python3 scripts/build_daily_content_package.py \
            --slug "${{ steps.slug.outputs.value }}" \
            --base-url "${SITE_BASE_URL}" \
            ${ROTATION_ARGS}

      - name: Build AI daily package
        if: ${{ github.event.inputs.use_openai == 'true' }}
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ROTATION_ARGS=""
          if [ "${{ steps.slug.outputs.value }}" = "auto" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ROTATION_ARGS="--rotation-index ${{ github.run_number }}"
          fi
          python3 scripts/build_daily_content_package.py \
            --slug "${{ steps.slug.outputs.value }}" \
            --base-url "${SITE_BASE_URL}" \
            --use-openai \
            ${ROTATION_ARGS}

      - name: Commit generated daily package
        run: |
          git add content/machine/daily
          if git diff --cached --quiet; then
            echo "Nessuna modifica da salvare."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add daily content package"
          git push
